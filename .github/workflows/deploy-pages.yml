name: Deploy To Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        id: install
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm ci --registry=https://registry.npmjs.org/ 2>&1 | tee npm-ci.log

      - name: Surface npm ci error
        if: steps.install.outcome == 'failure'
        shell: bash
        run: |
          tail -n 60 npm-ci.log > npm-ci-tail.log || true
          summary=$(tr '\n' ' ' < npm-ci-tail.log | sed 's/%/%25/g; s/\r/%0D/g; s/\n/%0A/g')
          echo "::error title=npm ci failed::$summary"
          exit 1

      - name: Build app
        if: steps.install.outcome == 'success'
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_STUDENT_EMAIL_DOMAIN: ${{ secrets.VITE_STUDENT_EMAIL_DOMAIN }}

      - name: Deploy to Cloudflare Pages
        if: steps.install.outcome == 'success'
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -o pipefail
          npx wrangler@latest pages deploy dist --project-name swu-date --branch main 2>&1 | tee wrangler-deploy.log
          status=${PIPESTATUS[0]}
          if [ $status -ne 0 ]; then
            tail -n 80 wrangler-deploy.log > wrangler-deploy-tail.log || true
            summary=$(tr '\n' ' ' < wrangler-deploy-tail.log | sed 's/%/%25/g; s/\r/%0D/g; s/\n/%0A/g')
            echo "::error title=Cloudflare Pages deploy failed::$summary"
            exit $status
          fi
